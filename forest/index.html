<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/4.0.37/fullpage.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/4.0.37/fullpage.css">
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.css">
    <script src="js/count.js"></script>
    <!--// 외부 파일 먼저 불러오    기-->

    <link rel="shortcut icon" href="favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/common.js"></script>
    <script src="js/main.js"></script>
    <title>생명의숲</title>
</head>

<body>
    <header class="header" data-bg="white   ">
        <div class="wrapper">
            <h1 class="logo"><a href="index.html"><span class="sr-only">생명의숲</span></a></h1>
            <nav class="gnb">
                <button class="gnb_open"><span class="sr-only">메뉴열기</span></button>
                <div class="gnb_wrap">
                    <ul class="dpeth1">
                        <li><a href="#n"><span>소개</span></a></li>
                        <li><a href="#n"><span>활동</span></a></li>
                        <li><a href="#n"><span>참여와후원</span></a></li>
                        <li><a href="#n"><span>자료실</span></a></li>
                    </ul>
                </div>
            </nav>
            <div class="util">
                <a href="#n" class="mypage"><span class="sr-only">마이페이지</span></a>
                <div class="search"><button class="search_open"><span class="sr-only">검색열기</span></button></div>
            </div>
        </div>
    </header>
    <div id="fullpage">
        <!--//section fp-auto-height-responsive 모바일에서는 fullpage 안함-->
        <section class="section visual fp-auto-height-responsive">
            <div class="swiper"> <!-- 팝업의 높이와 넓이를 css에서 줄 수 있는 요소-->
                <ul class="swiper-wrapper"> <!-- 각 팝업 콘텐츠를 감싸는 요소-->
                    <li class="swiper-slide">
                        <!-- 이미지를 확대하는 애니메이션을 추가하려면 이미지 태그로 코딩해야함-->
                        <div class="photo"><img src="images/main/visual01.jpg" alt=""></div>
                        <div class="visual_txt">
                            <div class="line"><span>작은 행동이,</span></div>
                            <div class="line"><span>숲을 만듭니다</span></div>
                        </div>
                    </li> 
                    <li class="swiper-slide">
                        <!-- 이미지를 확대하는 애니메이션을 추가하려면 이미지 태그로 코딩해야함-->
                        <div class="photo"><img src="images/main/visual02.jpg" alt=""></div>
                        <div class="visual_txt">
                            <div class="line"><span>숲을 돌보고,</span></div>
                            <div class="line"><span>세상을 돌봅니다</span></div>
                        </div>
                    </li> 
                    <li class="swiper-slide">
                        <!-- 이미지를 확대하는 애니메이션을 추가하려면 이미지 태그로 코딩해야함-->
                        <div class="video">
                            <video autoplay muted loop playsinline aria-label="비  오는 날 잎사귀를 확대한 영상">
                                <source src="images/main/visual03.mp4">
                            </video>
                        </div>
                        <div class="visual_txt">
                            <div class="line"><span>숲을 살리고,</span></div>
                            <div class="line"><span>삶을 바꿉니다</span></div>
                        </div>
                    </li> 
                </ul>
            </div>
        </section><!--visual-->
        <section class="section tree fp-auto-height-responsive">
            <div class="wrapper">
               <div class="txt">
                <h2>
                    <strong class="counter" data-start="0" data-end="39488">39,488</strong>
                    <!-- <strong class="counter" data-start="0" data-end="3">3</strong>
                    <strong class="counter" data-start="0" data-end="9">9</strong>
                    <strong>,</strong>
                    <strong class="counter" data-start="0" data-end="4">4</strong>
                    <strong class="counter" data-start="0" data-end="8">8</strong>
                    <strong class="counter" data-start="0" data-end="8">8</strong> -->
                    <span>그루</span>
                </h2>
                <p class="sub_tit">2025 심은 나무 <br>39,488그루의 변화</p>
                <p></p>
               </div>
               <div class="photo">
                    <img src="images/main/tree.png" alt="나무" class="tree">
                    <img src="images/main/tree02.png" alt="나뭇잎" class="tree02">
                    <img src="images/main/tree03.png" alt="큰나뭇잎" class="tree03">
                    <img src="images/main/cloud01.png" alt="큰 구름" class="cloud01">
                    <img src="images/main/cloud02.png" alt="작은 구름" class="cloud02">
                    <img src="images/main/sun.png" alt="태양" class="sun">
               </div>
            </div>
        </section><!--tree-->
        <section class="section biz fp-auto-height-responsive">
            <div class="wrapper">3.biz</div>
        </section><!--biz-->
        <section class="section story fp-auto-height-responsive">
            <div class="wrapper"> 4.story</div>
        </section><!--story-->
        <footer class="footer section fp-auto-height">
            <div class="wrapper"> 5.footer</div>
        </footer><!--footer-->
    </div><!--fullpage-->
    <!-- data-속성 이런 속성은 내가 맘대로 만들어낸 속성 
        class에 쓰기에는 지웠다가 썼다가 하기 귀찮고 
        그래서 jquery에서 값을 마음대로 쓰라고 쓰는 속성-->
    <aside class="sec_nav" data-bg="white">
        <ul>
            <li class="active"><a href="#main"><span>Main</span></a></li>
            <li><a href="#tree"><span>나무심기</span></a></li>
            <li><a href="#biz"><span>숲 활동</span></a></li>
            <li><a href="#story"><span>활동 이야기</span></a></li>
        </ul>
    </aside>

                <li class="kakao"><a href="#n"><span>같이가치</span></a></li>

                <li class="green"><a href="#n"><span>그린짐</span></a></li>
                <li class="top"><a><span>TOP</span></a></li>
            </ul>
        </div>
        <button class="close"><span></span></button>

</html>
